# Cloudflare Worker config for the qb-td backend.
# Setup steps: ../README.md
name = "qb-td"
main = "worker.js"
compatibility_date = "2026-07-01"

[[d1_databases]]
binding = "DB"
database_name = "qb-td"
database_id = "d57faef8-7c4b-45c6-9d13-7a7d9ca2d312"

[[r2_buckets]]
binding = "DATA"
bucket_name = "qb-td-data"

[vars]
# Origin of the GitHub Pages site — used for CORS.
ALLOWED_ORIGIN = "https://qbsuite.github.io"

# No secrets: all access is via unguessable link secrets (see worker.js).
