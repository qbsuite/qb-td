<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="referrer" content="no-referrer">
<title>qb-td</title>
<link rel="stylesheet" href="css/td.css">
</head>
<body>
<div class="wrap narrow">
  <header>
    <h1 id="tname">qb-td</h1>
    <span class="spacer"></span>
    <span id="room" class="sub"></span>
  </header>
  <div id="msg"></div>

  <div class="card" id="roundcard" hidden>
    <div class="row">
      <b id="curround"></b>
      <span class="spacer" style="flex:1"></span>
      <span id="rounds"></span>
      <span id="nopacket" class="muted" hidden>no packet yet</span>
    </div>
    <div class="row" style="margin-top:6px">
      <span id="closes" class="muted"></span>
      <span class="spacer" style="flex:1"></span>
      <a id="readerlink" href="#">read in browser</a>
    </div>
  </div>

  <div id="uparea">
    <h2>upload game files</h2>
    <div class="card">
      <div class="row">
        <label>round <input id="upround" type="number" min="1" max="999" style="width:70px"></label>
        <input id="upfiles" type="file" multiple accept=".qbj,.json">
      </div>
      <div class="row" style="margin-top:8px">
        <button id="upbtn" class="primary">upload</button>
        <span class="muted">the .qbj and the game file</span>
      </div>
    </div>

    <h2>this room's uploads</h2>
    <div id="uploads" class="tablewrap"></div>
  </div>
</div>
<script type="module">
import { pub, esc, fmtBytes } from './js/api.js';

const $ = (id) => document.getElementById(id);
const secret = new URLSearchParams(location.search).get('b') || '';
const POLL_MS = 60000; // only while the tab is visible
let state = null;
let closed = false;

function say(text, bad = false) {
  $('msg').textContent = text || '';
  $('msg').className = bad ? 'bad' : '';
}

function render() {
  document.title = state.tournament + ' - ' + state.room;
  $('tname').textContent = state.tournament;
  $('room').textContent = state.room;
  $('roundcard').hidden = false;
  $('curround').textContent = 'round ' + state.current_round;
  $('closes').textContent = 'room open until ' + new Date(state.closes).toLocaleString();
  const packets = state.packets || (state.packet ? [state.packet] : []);
  $('rounds').innerHTML = packets.map((p) =>
    `<a href="#" class="pill${p.number === state.current_round ? ' on' : ''}" data-round="${p.number}"
      title="${esc(p.packet_name)}">round ${p.number}</a>`).join(' ');
  $('nopacket').hidden = !!packets.length;
  if (!$('upround').value) $('upround').value = state.current_round;
  const extra = state.upload_count > state.uploads.length
    ? `<div class="muted" style="margin-top:6px">latest ${state.uploads.length} of ${state.upload_count}</div>` : '';
  $('uploads').innerHTML = (state.uploads.length ? `<table>
    <tr><th class="num">round</th><th>file</th><th class="num">size</th><th>status</th></tr>
    ${state.uploads.map((u) => `<tr>
      <td class="num">${u.round}</td>
      <td>${esc(u.filename)}</td>
      <td class="num">${fmtBytes(u.size)}</td>
      <td>${u.error ? `<span class="bad">${esc(u.error)}</span>` : '<span class="ok">ok</span>'}</td>
    </tr>`).join('')}
  </table>` : '<div class="muted">none yet</div>') + extra;
}

function showClosed() {
  closed = true;
  $('roundcard').hidden = true;
  $('uparea').hidden = true;
  say('room closed', true);
}

async function refresh() {
  if (closed) return;
  try {
    state = await pub('/b/' + secret);
    render();
  } catch (e) {
    if (e.message === 'room closed') showClosed();
    else say(e.message, true);
  }
}

$('rounds').onclick = async (e) => {
  const round = Number(e.target.dataset && e.target.dataset.round);
  if (!round) return;
  e.preventDefault();
  try {
    const res = await pub('/b/' + secret + '/packet?round=' + round);
    // pub() parses JSON-typed blobs (e.g. .json packets); rewrap for download
    const blob = res instanceof Response
      ? await res.blob()
      : new Blob([JSON.stringify(res)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = e.target.title || 'packet';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch (e2) { say(e2.message, true); }
};

$('upbtn').onclick = async () => {
  const files = [...$('upfiles').files];
  if (!files.length) { say('choose files', true); return; }
  const round = Number($('upround').value);
  $('upbtn').disabled = true;
  try {
    for (const f of files) {
      say('uploading ' + f.name);
      const out = await pub(`/b/${secret}/upload?round=${round}&name=${encodeURIComponent(f.name)}`,
        { method: 'POST', body: f });
      if (out.error) say(f.name + ': ' + out.error, true);
    }
    say('uploaded');
    $('upfiles').value = '';
    await refresh();
  } catch (e) {
    if (e.message === 'room closed') showClosed();
    else say(e.message, true);
  }
  $('upbtn').disabled = false;
};

if (!secret) say('bad link', true);
else {
  $('readerlink').href = 'read.html?b=' + encodeURIComponent(secret);
  refresh();
  // Poll only while visible: a backgrounded laptop tab costs nothing, and
  // an immediate refresh on focus keeps the current round fresh exactly
  // when the mod looks at the page.
  setInterval(() => { if (document.visibilityState === 'visible') refresh(); }, POLL_MS);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') refresh();
  });
}
</script>
</body>
</html>
