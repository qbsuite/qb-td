<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="referrer" content="no-referrer">
<title>qb-td</title>
<link rel="stylesheet" href="css/td.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>qb-td</h1>
    <span class="sub">tournament hub</span>
  </header>
  <div id="msg"></div>
  <div id="view"></div>
</div>
<div id="linkmodal" class="modalback" hidden>
  <div class="modal">
    <h2 style="margin-top:0">save this link</h2>
    <div class="mono linkbox" id="modallink"></div>
    <p>this device keeps the tournament in its list here. the link is the
    only way to open it from another device or after clearing browser
    data.</p>
    <p>it stops working 48 hours after creation, on
    <b id="modalcloses"></b>. export stats and files before then.</p>
    <div class="row" style="margin-top:12px">
      <button id="modalcopy" class="primary">copy link</button>
      <button id="modalok">saved it</button>
    </div>
  </div>
</div>
<script type="module" src="js/admin.js"></script>
</body>
</html>
