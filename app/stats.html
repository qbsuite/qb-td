<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>stats</title>
<link rel="stylesheet" href="css/td.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="tname">stats</h1>
    <span class="spacer"></span>
    <span id="round" class="sub"></span>
    <button id="refresh">refresh</button>
  </header>
  <div id="msg"></div>
  <div id="statsout"></div>
</div>
<script type="module">
import { pub, esc } from './js/api.js';
import { parseMatch, parseRoster } from './engine/qbj.js';
import { aggregate } from './engine/stats.js';
import { renderStats } from './js/statsview.js';

const $ = (id) => document.getElementById(id);
const slug = new URLSearchParams(location.search).get('t') || '';
const CHECK_MS = 300000; // version check while visible; data changes only on upload
let lastVersion = null;

function say(text, bad = false) {
  $('msg').textContent = text || '';
  $('msg').className = bad ? 'bad' : '';
}

async function fetchRoster(state) {
  if (!state.roster) return null;
  try {
    const res = await pub('/pub/' + slug + '/roster');
    return parseRoster(JSON.parse(await res.text()));
  } catch (e) { return null; } // stats still render without it
}

// One request for all games; per-file fetch only if the bundle is missing.
async function fetchMatches(state, errors) {
  const matches = [];
  try {
    const res = await pub('/pub/' + slug + '/bundle');
    const bundle = await res.json();
    for (const entry of bundle.entries) {
      try {
        const m = parseMatch(entry.qbj, { filename: entry.filename });
        m.room = entry.room;
        matches.push(m);
      } catch (e) { errors.push(entry.filename + ': ' + e.message); }
    }
    return matches;
  } catch (e) { /* no bundle yet: fall through */ }

  await Promise.all(state.files.map(async (f) => {
    try {
      const res = await pub('/pub/' + slug + '/qbj/' + f.id);
      const m = parseMatch(JSON.parse(await res.text()), { filename: f.filename });
      m.room = f.room;
      matches.push(m);
    } catch (e) { errors.push(f.filename + ': ' + e.message); }
  }));
  return matches;
}

async function load(force = false) {
  try {
    const state = await pub('/pub/' + slug);
    document.title = state.name + ' stats';
    $('tname').textContent = state.name;
    $('round').textContent = 'round ' + state.current_round;
    if (!force && state.version === lastVersion) { say(''); return; }

    say('loading');
    const errors = [];
    const [roster, matches] = await Promise.all([
      fetchRoster(state),
      fetchMatches(state, errors),
    ]);
    lastVersion = state.version;

    if (!matches.length) {
      $('statsout').innerHTML = '<div class="muted">no games yet</div>';
      say('');
      return;
    }
    renderStats($('statsout'), aggregate(matches, roster), errors);
    say('');
  } catch (e) { say(e.message, true); }
}

$('refresh').onclick = () => load();
if (!slug) say('bad link', true);
else {
  load(true);
  setInterval(() => { if (document.visibilityState === 'visible') load(); }, CHECK_MS);
}
</script>
</body>
</html>
